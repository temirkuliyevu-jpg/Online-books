<!DOCTYPE html>
<html lang="uz" data-theme="cupcake">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NanoLib | Real Download</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+DK+Uloopet:wght@100..400&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Playwrite DK Uloopet', cursive;
            background: linear-gradient(135deg, #059669 0%, #db2777 50%, #4f46e5 100%);
            min-height: 100vh;
            color: white;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .rgb-border {
            border: 3px solid transparent;
            background-image: linear-gradient(rgba(255, 255, 255, 0), rgba(255, 255, 255, 0)), 
                              linear-gradient(to right, #00ff00, #ff00ff, #00ffff);
            background-origin: border-box;
            background-clip: content-box, border-box;
        }
        .book-img { height: 280px; object-fit: cover; width: 100%; }
    </style>
</head>
<body class="p-4">

    <header class="navbar glass-card rounded-2xl mb-8 max-w-6xl mx-auto px-6 shadow-2xl">
        <div class="flex-1">
            <h1 class="text-2xl font-bold">📚 NanoLib <span class="text-xs text-green-300">v2.0</span></h1>
        </div>
    </header>

    <div class="flex flex-wrap justify-center gap-3 mb-8">
        <button onclick="fetchBooks('fiction')" class="btn btn-sm btn-secondary shadow-lg">Badiiy</button>
        <button onclick="fetchBooks('thriller')" class="btn btn-sm btn-success shadow-lg">Boevik</button>
        <button onclick="fetchBooks('adventure')" class="btn btn-sm btn-primary shadow-lg">Sarguzasht</button>
    </div>

    <div id="booksGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 max-w-7xl mx-auto">
        </div>

    <div class="flex flex-col items-center my-10">
        <div id="loader" class="hidden loading loading-bars loading-lg text-white mb-4"></div>
        <button id="loadMoreBtn" onclick="loadMore()" class="btn btn-wide glass text-white border-white/40">Yana ko'proq (999+)</button>
    </div>

    <script>
        let offset = 0;
        let category = 'adventure';

        async function fetchBooks(subj = 'adventure', clear = true) {
            const grid = document.getElementById('booksGrid');
            const loader = document.getElementById('loader');
            
            if(clear) {
                grid.innerHTML = '';
                offset = 0;
                category = subj;
            }

            loader.classList.remove('hidden');

            try {
                // API so'rovi
                const res = await fetch(`https://openlibrary.org/subjects/${subj}.json?limit=8&offset=${offset}`);
                const data = await res.json();

                data.works.forEach(book => {
                    const img = book.cover_id ? `https://covers.openlibrary.org/b/id/${book.cover_id}-L.jpg` : 'https://via.placeholder.com/400x600?text=No+Cover';
                    
                    // Har bir kitob uchun yuklab olish havolasi (Open Library sahifasi)
                    const downloadLink = `https://openlibrary.org${book.key}`;

                    grid.innerHTML += `
                        <div class="card glass-card hover:scale-105 transition-all duration-300 shadow-xl border border-white/10">
                            <figure class="p-3">
                                <img src="${img}" class="rounded-lg rgb-border book-img" alt="book">
                            </figure>
                            <div class="card-body p-4">
                                <h2 class="text-sm font-bold truncate text-white">${book.title}</h2>
                                <p class="text-[10px] text-green-200">${book.authors ? book.authors[0].name : 'Noma\'lum muallif'}</p>
                                <div class="card-actions justify-center mt-3">
                                    <a href="${downloadLink}" target="_blank" class="btn btn-xs btn-block bg-green-500 hover:bg-pink-500 text-white border-none">
                                        📖 O'qish / Yuklash
                                    </a>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                console.error("Xato:", e);
            } finally {
                loader.classList.add('hidden');
            }
        }

        function loadMore() {
            offset += 8;
            fetchBooks(category, false);
        }

        // Birinchi yuklanish
        window.onload = () => fetchBooks('adventure');
    </script>
</body>
</html>
