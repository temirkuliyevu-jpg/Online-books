<!DOCTYPE html>
<html lang="uz" data-theme="cupcake">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NanoLib | Online Kutubxona</title>
    
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+DK+Uloopet:wght@100..400&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Playwrite DK Uloopet', cursive;
            background: linear-gradient(135deg, #10b981 0%, #ff7eb3 50%, #8b5cf6 100%);
            min-height: 100vh;
            color: white;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .rgb-border {
            border: 3px solid transparent;
            background-image: linear-gradient(rgba(255, 255, 255, 0), rgba(255, 255, 255, 0)), 
                              linear-gradient(to right, #ff0000, #00ff00, #0000ff);
            background-origin: border-box;
            background-clip: content-box, border-box;
        }
        .book-img {
            height: 300px;
            object-fit: cover;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="navbar glass-card rounded-3xl mb-8 shadow-2xl px-6 max-w-7xl mx-auto">
        <div class="flex-1">
            <a class="text-3xl font-bold drop-shadow-lg text-white">📚 NanoLib API</a>
        </div>
        <div class="flex-none gap-4">
            <div class="hidden md:block">
                <span class="badge badge-success gap-2">Online</span>
            </div>
            <div class="w-10 rounded-full ring ring-green-400 ring-offset-base-100 ring-offset-2 overflow-hidden">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Nurbek" />
            </div>
        </div>
    </header>

    <div class="flex flex-wrap justify-center gap-4 mb-10">
        <button onclick="fetchBooks('fiction')" class="btn btn-secondary bg-pink-500 border-none hover:scale-105">Badiiy</button>
        <button onclick="fetchBooks('thriller')" class="btn btn-success bg-green-500 border-none hover:scale-105">Boevik</button>
        <button onclick="fetchBooks('adventure')" class="btn btn-primary bg-purple-600 border-none hover:scale-105">Sarguzasht</button>
        <button onclick="fetchBooks('science')" class="btn btn-accent bg-cyan-500 border-none hover:scale-105">Ilmiy</button>
    </div>

    <section class="glass-card p-6 rounded-2xl mb-10 shadow-xl max-w-5xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <select id="genreSelect" class="select select-bordered w-full bg-white/20 text-white placeholder-white">
                <option value="all" class="text-black">Barcha Janrlar</option>
                <option value="fiction" class="text-black">Badiiy</option>
                <option value="action" class="text-black">Boevik</option>
                <option value="adventure" class="text-black">Sarguzasht</option>
            </select>
            <input type="number" id="yearInput" placeholder="Yili (masalan: 2020)" class="input input-bordered w-full bg-white/20 text-white placeholder-white" />
            <input type="text" id="letterInput" placeholder="Bosh harfi" maxlength="1" class="input input-bordered w-full bg-white/20 text-white placeholder-white" />
        </div>
        <button onclick="applyFilters()" class="btn btn-block mt-4 bg-gradient-to-r from-green-400 via-pink-500 to-purple-600 text-white border-none text-lg">
            🔍 Filtrlash va Qidirish
        </button>
    </section>

    <div id="booksGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 max-w-7xl mx-auto">
        </div>

    <div class="flex flex-col items-center mt-16 mb-20">
        <div id="loader" class="hidden loading loading-spinner loading-lg text-white mb-4"></div>
        <button id="loadMoreBtn" onclick="loadMore()" class="btn btn-wide btn-lg glass text-white hover:bg-green-600 transition-all border-2 border-white/50 shadow-2xl">
            Yana yuklash (999,999,999+)
        </button>
    </div>

    <script>
        let currentOffset = 0;
        let currentSubject = 'adventure';

        // Kitoblarni API dan olish funksiyasi
        async function fetchBooks(subject = 'adventure', offset = 0, append = false) {
            const grid = document.getElementById('booksGrid');
            const loader = document.getElementById('loader');
            
            currentSubject = subject;
            loader.classList.remove('hidden');

            try {
                const response = await fetch(`https://openlibrary.org/subjects/${subject}.json?limit=8&offset=${offset}`);
                const data = await response.json();
                
                if (!append) grid.innerHTML = ''; // Agar yangi kategoriya bo'lsa, tozalaymiz

                data.works.forEach(book => {
                    const coverId = book.cover_id;
                    const coverImg = coverId ? `https://covers.openlibrary.org/b/id/${coverId}-L.jpg` : 'https://via.placeholder.com/400x600?text=No+Cover';
                    
                    const bookCard = `
                        <div class="card glass-card shadow-2xl hover:scale-105 transition-transform duration-500 overflow-hidden">
                            <figure class="p-4">
                                <img src="${coverImg}" alt="${book.title}" class="rounded-xl rgb-border shadow-lg book-img w-full" />
                            </figure>
                            <div class="card-body p-5">
                                <h2 class="card-title text-sm font-bold text-white h-12 overflow-hidden">${book.title}</h2>
                                <p class="text-xs text-green-200">Yil: ${book.first_publish_year || 'Noma\'lum'}</p>
                                <div class="card-actions justify-end mt-2">
                                    <button class="btn btn-xs btn-outline border-pink-400 text-white">Yuklab olish</button>
                                </div>
                            </div>
                        </div>
                    `;
                    grid.innerHTML += bookCard;
                });

            } catch (error) {
                console.error("Xatolik:", error);
            } finally {
                loader.classList.add('hidden');
            }
        }

        // "Yana yuklash" tugmasi
        function loadMore() {
            currentOffset += 8;
            fetchBooks(currentSubject, currentOffset, true);
        }

        // Filtrni qo'llash (Simulyatsiya va API qidiruvi)
        function applyFilters() {
            const genre = document.getElementById('genreSelect').value;
            const letter = document.getElementById('letterInput').value;
            
            // API qidiruvini boshlash
            currentOffset = 0;
            if(genre !== 'all') {
                fetchBooks(genre, 0, false);
            } else {
                fetchBooks('library', 0, false);
            }
        }

        // Sahifa yuklanganda birinchi marta kitoblarni chiqarish
        window.onload = () => fetchBooks('adventure');

    </script>
</body>
</html>
